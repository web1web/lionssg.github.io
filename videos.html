<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos Instructivos | LIONS S.G.</title>
    <style>
        :root { --oro: #D4AF37; --negro: #000000; --gris: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--negro); color: white; }

        header { padding: 30px 5%; text-align: center; border-bottom: 2px solid var(--oro); background: #050505; }
        .btn-volver { display: inline-block; margin-bottom: 15px; color: var(--oro); text-decoration: none; font-weight: bold; }

        .container { padding: 30px 5%; max-width: 1000px; margin: auto; }
        .section-title { color: var(--oro); text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }

        /* CONTENEDOR DE VIDEOS */
        .video-card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #222; margin-bottom: 30px; }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .video-info { padding: 20px; border-top: 1px solid #222; }
        .video-info h3 { color: var(--oro); font-size: 1.1rem; margin-bottom: 8px; }
        .video-info p { color: #888; font-size: 0.9rem; }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
    </style>
</head>
