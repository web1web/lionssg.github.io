<style>
    /* 1. Fondo negro global y marca de agua */
    html, body {
        background-color: #000000;
        margin: 0;
        padding: 0;
        color: white;
        font-family: 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-image: url('https://web1web.github.io/lionssg.github.io/imagenes/lions-sg-logo.png'); 
        background-repeat: no-repeat;
        background-position: center;
        background-size: 100% auto; /* Marca de agua gigante */
        opacity: 0.05; 
        z-index: -1;
    }

    /* 2. Contenedor Principal */
    .mantenimiento-container {
        width: 95%; 
        max-width: 1000px; 
        margin: auto;
        padding: 70px 0;
        text-align: center;
    }

    /* 3. Logo Impresionante */
    .logo-principal {
        width: 250px; /* Agrandado a 250px para máxima presencia */
        height: auto;
        margin-bottom: 30px;
        filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
    }

    .mantenimiento-title {
        color: #FFFFFF;
        font-size: 4rem; /* Tamaño gigante para el título principal */
        font-weight: 900;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: -1px; /* Efecto compacto y moderno */
        line-height: 0.95;
    }

    .divider-gold {
        width: 100%;
        height: 6px; /* Más grueso para dividir con fuerza */
        background: linear-gradient(90deg, transparent, #D4AF37, #D4AF37, transparent);
        margin-bottom: 60px;
    }

    /* 4. Tarjetas con Contenido de Importancia */
    .mantenimiento-card {
        background: rgba(15, 15, 15, 0.98);
        border-radius: 40px;
        padding: 70px 30px; 
        margin-bottom: 40px;
        border: 2px solid #333; /* Borde más definido */
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .mantenimiento-card h3 {
        color: #D4AF37;
        font-size: 3rem; /* Título de servicio masivo */
        margin-bottom: 25px;
        font-weight: 900;
        text-transform: uppercase;
    }

    .mantenimiento-card span {
        color: #888;
        font-size: 1.5rem; 
        display: block;
        margin-top: 15px;
        font-weight: 300;
        font-style: italic;
    }

    .mantenimiento-card p {
        color: #FFFFFF;
        font-size: 2.2rem; /* Tamaño de letra muy importante para los productos */
        font-weight: 700;
        margin: 15px 0;
        line-height: 1.3;
        letter-spacing: 0.5px;
    }

    /* 5. Botones Gigantes */
    .btn-fb {
        background: #0866FF; 
        color: white; 
        padding: 25px 45px; 
        border-radius: 70px; 
        text-decoration: none; 
        display: inline-flex; 
        align-items: center; 
        gap: 20px; 
        font-weight: 900; 
        font-size: 1.5rem; 
        border: 3px solid white;
        transition: transform 0.3s ease;
    }

    .btn-volver {
        display: inline-block;
        margin-top: 60px;
        padding: 22px 70px;
        border: 3px solid #D4AF37;
        border-radius: 70px;
        color: #D4AF37;
        text-decoration: none;
        font-size: 1.6rem;
        font-weight: 900;
        text-transform: uppercase;
    }
</style>

<div class="mantenimiento-container">
    <img src="https://web1web.github.io/lionssg.github.io/imagenes/lions-sg-logo.png" alt="Lions S.G." class="logo-principal">

    <h1 class="mantenimiento-title">Diseño &<br>Sublimación</h1>

    <div class="divider-gold"></div>

    <div class="mantenimiento-card">
        <h3>Diseño <span>Tu marca en otro nivel</span></h3>
        <p>Creatividad 100% Personalizada</p>
    </div>

    <div class="mantenimiento-card">
        <h3>Productos</h3>
        <p>✓ Tazas de Alta Calidad</p>
        <p>✓ Camisetas Técnicas</p>
        <p>✓ Gorras Premium</p>
        <p>✓ Tomatodos</p>
        <p>✓ Llaveros y Más...</p>
    </div>

    <div style="margin-top: 50px;">
        <a href="https://www.facebook.com/share/1BEsWK1uvY/" target="_blank" class="btn-fb">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" style="width: 35px; filter: brightness(0) invert(1);">
            MÁS DISEÑOS EN FACEBOOK
        </a>
    </div>

    <a href="index.html" class="btn-volver">← Regresar</a>
</div>
