<style>
    /* 1. Fondo negro global y marca de agua */
    html, body {
        background-color: #000000;
        margin: 0;
        padding: 0;
        color: white;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-image: url('https://web1web.github.io/lionssg.github.io/imagenes/lions-sg-logo.png');

    /* 2. Contenedor Principal */
    .mantenimiento-container {

    /* 3. Logo y Títulos Gigantes */
    .logo-principal {

        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
    }

    .mantenimiento-title {
        color: #FFFFFF;

        letter-spacing: 2px;
        line-height: 1.1;
    }

        height: 4px;

        margin-bottom: 50px;

    .mantenimiento-card {
        background: rgba(18, 18, 18, 0.95);

    .mantenimiento-card h3 {

    }

    .mantenimiento-card span {
        color: #777;
        font-size: 1.2rem; /* Subtítulo agrandado */

        margin-top: 10px;
        font-weight: 400;
        text-transform: none;
    }

    .mantenimiento-card p {
        color: #FFFFFF;
        font-size: 1.6rem; /* Texto descriptivo agrandado de 1.3rem a 1.6rem */
        font-weight: 400;
        margin: 10px 0;
        line-height: 1.4;
    }

    /* 5. Botones */
    .btn-fb {
        background: #0866FF; 
        color: white; 
        padding: 22px 40px; 
        border-radius: 60px; 
        text-decoration: none; 
        display: inline-flex; 
        align-items: center; 
        gap: 15px; 
        font-weight: 800; 
        font-size: 1.2rem; 
        border: 2px solid white;
        transition: 0.3s;
    }

    .btn-volver {
        display: inline-block;
        margin-top: 50px;
        padding: 20px 60px;
        border: 2px solid #D4AF37;
        border-radius: 60px;
        color: #D4AF37;
        text-decoration: none;
        font-size: 1.3rem;
        font-weight: bold;
        text-transform: uppercase;

</style>
