<style>
    /* 1. Fondo negro global y marca de agua */
    html, body {
        background-color: #000000; /* Evita que se vea blanco al final */
        margin: 0;
        padding: 0;
        color: white;
        font-family: 'Segoe UI', sans-serif;
    }

    /* Marca de agua fija en el fondo */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-image: url('https://web1web.github.io/lionssg.github.io/images/lions-sg-logo.png'); 
        background-repeat: no-repeat;
        background-position: center;
        background-size: 70% auto;
        opacity: 0.03; /* Muy sutil */
        z-index: -1;
        pointer-events: none;
    }

    /* 2. Diseño adaptable (Mobile First) */
    .grid-sublimacion {
        display: grid;
        grid-template-columns: 1fr; /* Por defecto 1 columna para celular */
        gap: 20px;
        max-width: 1200px;
        margin: auto;
    }

    /* Escritorio: 3 columnas */
    @media (min-width: 768px) {
        .grid-sublimacion {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    /* Estilo de tarjetas */
    .card-sub {
        background: #111111;
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        border: 1px solid #222222;
    }
</style>

            <p style="color: #aaa; font-size: 0.9rem;">Diseños únicos y logos para tus tazas.</p>
        </div>

        <div class="card-sub">
            <div style="font-size: 3rem; margin-bottom: 15px;">👕</div>
            <h3 style="color: #D4AF37; margin-bottom: 10px;">Camisetas Técnicas</h3>
            <p style="color: #aaa; font-size: 0.9rem;">Estampados de alta calidad para empresas.</p>
        </div>

        <div class="card-sub">
