        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--negro); color: var(--blanco); line-height: 1.6; overflow-x: hidden; }

        header { padding: 40px 5%; text-align: center; background: linear-gradient(to bottom, #111, #000); border-bottom: 2px solid var(--oro); }

        /* Secciones Generales */
        section { padding: 60px 5%; border-bottom: 1px solid #1a1a1a; }
        .section-title { color: var(--oro); text-align: center; font-size: 1.5rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px; }

        /* Grid de Tarjetas de Servicio */
        .grid-servicios { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .card { background: var(--gris-suave); padding: 30px; border-radius: 15px; border: 1px solid #222; transition: 0.3s; text-align: center; }
        .card:hover { border-color: var(--oro); transform: translateY(-5px); }
        .card h3 { color: var(--oro); margin-bottom: 15px; }
        .card ul { list-style: none; color: #ccc; font-size: 0.9rem; margin-bottom: 20px; }
        .card li { margin-bottom: 8px; }
        .btn-ver { display: inline-block; padding: 10px 25px; background: var(--oro); color: #000; text-decoration: none; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn-ver:hover { background: var(--oro-br); }

        /* FORZAR POSICIONES: WHATSAPP IZQUIERDA / TIDIO DERECHA */
        .boton-soporte-final {
            position: fixed !important;
            bottom: 20px !important;
            left: 20px !important; /* CAMBIADO A LA IZQUIERDA */
            right: auto !important;
            background: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 999999 !important;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .boton-soporte-final:hover { transform: scale(1.05); background: #1ebe57; }

        /* Tidio se mantiene en su posición original por defecto (Derecha) */
        #tidio-chat iframe, #tidio-chat-code iframe {
            right: 10px !important;
            left: auto !important;
