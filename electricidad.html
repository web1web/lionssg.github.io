<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Eléctricos | Lions S.G.</title>
    <style>
        :root { --oro: #D4AF37; --negro: #0a0a0a; --gris: #1a1a1a; --blanco: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--blanco); margin: 0; padding: 20px; }
        header { text-align: center; border-bottom: 2px solid var(--oro); padding: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; margin: auto; }
        .item { background: var(--gris); border: 1px solid #333; padding: 25px; border-radius: 10px; }
        .item h3 { color: var(--oro); margin-bottom: 15px; }
        .check { color: var(--oro); font-weight: bold; margin-right: 5px; }
        .btn-regresar { display: block; width: fit-content; margin: 40px auto; color: var(--oro); text-decoration: none; border: 1px solid var(--oro); padding: 10px 25px; border-radius: 50px; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" style="height: 60px;">
        <h1>Sistemas Eléctricos</h1>
    </header>

      <div class="divider-gold"></div>

        <div class="item">

            <h3> Residenciales y Comercial</h3>
          <p><span class="check">✔</span> Optimización de energía.</p>
            <p><span class="check">✔</span> Iluminación LED y tomas.</p>
        </div>
        <div class="item">
            <h3>Domotica y Automatización</h3>
            <p><span class="check">✔</span> Tomacorrientes Inteligentes</p>
            <p><span class="check">✔</span> Interruptores Inteligentes</p>
        </div>
    </div>
    <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
</body>
</html>
