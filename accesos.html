<style>

        background-image: url('https://web1web.github.io/lionssg.github.io/imagenes/lions-sg-logo.png');

    /* 2. Contenedor Principal (Más ancho en móviles) */
    .mantenimiento-container {
        width: 92%; /* Ocupa casi toda la pantalla lateral */
        max-width: 800px; /* En PC no se estira infinito */

        padding: 50px 0;

    }

    /* 3. Títulos más grandes */
    .mantenimiento-title {
        color: #FFFFFF;

    }

    .mantenimiento-card {

        border-radius: 25px;

    .mantenimiento-card h3 {
        color: #D4AF37;
        font-size: 1.8rem; /* Título de tarjeta más grande */

    }

    .mantenimiento-card span {
        color: #555;
        font-size: 1rem;
        display: block; /* Pone la marca abajo para que no estorbe */
        margin-top: 5px;
    }

    .mantenimiento-card p {
        color: #E0E0E0;
        font-size: 1.3rem; /* Texto de descripción más grande */
        font-weight: 300;
        margin: 0;
    }

    /* 5. Botón de acción claro */
    .btn-volver {
        display: inline-block;
        margin-top: 40px;
        padding: 18px 50px;
        border: 2px solid #D4AF37;
